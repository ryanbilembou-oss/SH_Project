services:
  silver-app:
    image: php:8.2-apache
    container_name: silver_happy_apache
    ports:
      - "8080:80"
    volumes:
      - ./app-php:/var/www/html
    restart: always
    depends_on:
      - silver-db
      - silver-go

  silver-go:
    build: ./api-go
    container_name: silver_happy_go
    env_file:
      - .env
    ports:
      - "8082:8081"

    restart: always
    depends_on:
      - silver-db

  silver-db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: silver_happy_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  silver-pma:
    image: phpmyadmin:latest
    container_name: silver_happy_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: silver-db
      MYSQL_ROOT_PASSWORD: root

volumes:
  db_data:
